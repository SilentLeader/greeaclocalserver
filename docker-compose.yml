services:
  gree-ac-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gree-ac-local-server
    restart: unless-stopped
    ports:
      - "5000:5000"  # TCP port for GREE devices (required)
      - "1813:1813"  # TCP port for GREE devices TLS
      - "5100:5100"  # Web UI port (HTTP)
      - "5443:5443"  # Web UI port (TLS/HTTPS)
    environment:
      # ASP.NET Core Environment
      - ASPNETCORE_ENVIRONMENT=Production
      
      # Kestrel Configuration (Web UI server)
      - ASPNETCORE_URLS=http://+:5100;https://+:5443
      
      # GREE Server Configuration
      - GreeServer__ServerOptions__DomainName=gree.example.com     # Change to your domain
      - GreeServer__ServerOptions__ExternalIp=192.168.1.100        # Change to your server IP
      - GreeServer__ServerOptions__TLSEnabled=true                 # Enable TLS for secure connections
      - GreeServer__EncryptionOptions__DefaultCryptoKey=a3K8Bx%2r8Y7#xDh
      
      # UI Configuration
      - GreeServer__EnableUI=true
      
      # Device Manager Configuration  
      - DeviceManager__DeviceTimeoutMinutes=60
      
      # Logging Configuration
      - Serilog__MinimumLevel=Information
      
    volumes:
      # Mount logs directory (create it if it doesn't exist)
      - ./logs:/app/logs
      
    networks:
      - gree-network

networks:
  gree-network:
    driver: bridge
